<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#05060a">
    <meta
      name="description"
      content="AstranoV ChatGPT lab: a local-first client for the AstranoV AI router."
    >
    <title>AstranoV // ChatGPT</title>
    <link rel="stylesheet" href="./src/styles.css">
    <script src="./config.js"></script>
    <script type="module" src="./src/app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand" id="brand-button" type="button" title="Reset session" aria-label="Reset session">
          <span class="brand-mark" aria-hidden="true">A</span>
          <span class="brand-name">ASTRANOV</span>
          <span class="brand-lab">// CHATGPT</span>
        </button>
        <div class="toolbar" aria-label="Session controls">
          <button class="tool-button" id="locate-button" type="button" title="Acquire location" aria-label="Acquire location">
            <span aria-hidden="true">LOC</span>
          </button>
          <button class="tool-button" id="clear-button" type="button" title="Clear history" aria-label="Clear history">
            <span aria-hidden="true">CLR</span>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="signal-board" aria-label="AstranoV signal">
          <div class="earth-stage" aria-hidden="true">
            <img
              class="earth-image"
              src="https://eoimages.gsfc.nasa.gov/images/imagerecords/57000/57730/land_ocean_ice_2048.jpg"
              alt=""
            >
            <div class="orbit orbit-one"></div>
            <div class="orbit orbit-two"></div>
            <div class="pulse-node node-one"></div>
            <div class="pulse-node node-two"></div>
            <div class="pulse-node node-three"></div>
          </div>
          <div class="signal-copy">
            <p class="eyebrow">OpenAI route</p>
            <h1>ChatGPT through the AstranoV brain.</h1>
            <div class="status-line" id="status-line">Local memory online</div>
          </div>
        </section>

        <section class="chat-panel" aria-label="ChatGPT lab conversation">
          <div class="chat-header">
            <div>
              <p class="eyebrow">Session</p>
              <h2>Collective intelligence channel</h2>
            </div>
            <div class="provider-lock" id="provider-lock">OPENAI MINI</div>
          </div>

          <div class="messages" id="messages" aria-live="polite"></div>

          <form class="composer" id="composer" autocomplete="off">
            <div class="mode-strip" aria-label="Provider lock">
              <label>
                <input type="radio" name="provider" value="openai-mini" checked>
                <span>OpenAI</span>
              </label>
              <label>
                <input type="radio" name="provider" value="astranov">
                <span>Cycle</span>
              </label>
            </div>
            <div class="input-row">
              <textarea
                id="prompt-input"
                name="prompt"
                rows="1"
                maxlength="4000"
                placeholder="Ask AstranoV through ChatGPT..."
                aria-label="Message"
              ></textarea>
              <button class="send-button" id="send-button" type="submit">Send</button>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
