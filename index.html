<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#02040a">
    <meta name="color-scheme" content="dark">
    <meta
      name="description"
      content="AstranoV ChatGPT lab: an orb-first collective intelligence surface routed through the AstranoV brain."
    >
    <title>AstranoV // ChatGPT</title>
    <link rel="preconnect" href="https://eoimages.gsfc.nasa.gov">
    <link rel="preconnect" href="https://svs.gsfc.nasa.gov">
    <link rel="stylesheet" href="./src/styles.css">
    <script src="./config.js"></script>
    <script type="module" src="./src/app.js"></script>
  </head>
  <body>
    <main class="cosmos" id="cosmos">
      <button class="brand" id="brand-button" type="button" aria-label="Heal and reload AstranoV">
        ASTRANOV
      </button>

      <section class="earth-system" aria-label="AstranoV orbital operating surface">
        <div class="starfield" aria-hidden="true">
          <img
            class="starfield-image"
            src="https://svs.gsfc.nasa.gov/vis/a000000/a004800/a004851/starmap_2020_4k_print.jpg"
            alt=""
            decoding="async"
            fetchpriority="high"
          >
        </div>
        <div class="earth-wrap" id="earth-wrap" aria-hidden="true">
          <img
            class="earth-image"
            src="https://eoimages.gsfc.nasa.gov/images/imagerecords/57000/57730/land_ocean_ice_2048.jpg"
            alt=""
          >
          <div class="terminator"></div>
          <div class="orbit-ring ring-inner"></div>
          <div class="orbit-ring ring-middle"></div>
          <div class="orbit-ring ring-outer"></div>
        </div>

        <div class="orb-layer" id="orb-layer" aria-label="Materialised AstranoV orbs"></div>
      </section>

      <button class="back-button" id="back-button" type="button" aria-label="Back">Back</button>

      <button class="cic" id="cic-float" type="button" aria-label="Collective intelligence cycle">
        <span class="cic-node cic-a"></span>
        <span class="cic-node cic-b"></span>
        <span class="cic-node cic-c"></span>
        <span class="cic-core" id="cic-label">AI</span>
      </button>

      <button class="tray-trigger" id="tray-trigger" type="button" aria-label="Open drawer"></button>

      <aside class="drawer" id="drawer" aria-label="AstranoV drawer" aria-hidden="true">
        <div class="drawer-handle" aria-hidden="true"></div>
        <div class="drawer-head">
          <div>
            <p class="eyebrow" id="drawer-eyebrow">AI in context</p>
            <h1 id="drawer-title">AstranoV ChatGPT</h1>
          </div>
          <button class="icon-button" id="drawer-close" type="button" aria-label="Close drawer">x</button>
        </div>

        <section class="drawer-section active" id="panel-chat" data-panel="chat">
          <div class="quick-deck" aria-label="Suggested AstranoV prompts">
            <button type="button" data-prompt="Map today's highest-signal news into useful orbs.">News orbit</button>
            <button type="button" data-prompt="Plan a focused pilot route for the next step.">Pilot route</button>
            <button type="button" data-prompt="Summarise wallet, work, and discovery priorities.">Priority scan</button>
          </div>
          <div class="messages" id="messages" aria-live="polite"></div>
          <form class="composer" id="composer" autocomplete="off">
            <div class="mode-strip" aria-label="Provider lock">
              <label>
                <input type="radio" name="provider" value="openai-mini" checked>
                <span>OpenAI</span>
              </label>
              <label>
                <input type="radio" name="provider" value="astranov">
                <span>Cycle</span>
              </label>
            </div>
            <div class="input-row">
              <textarea
                id="prompt-input"
                name="prompt"
                rows="1"
                maxlength="4000"
                placeholder="Ask AstranoV..."
                aria-label="Message"
              ></textarea>
              <button class="send-button" id="send-button" type="submit">Send</button>
            </div>
          </form>
        </section>

        <section class="drawer-section" id="panel-status" data-panel="status">
          <div class="status-grid">
            <article><span>Router</span><strong id="status-line">Checking</strong></article>
            <article><span>Provider</span><strong id="provider-lock">OPENAI MINI</strong></article>
            <article><span>Mode</span><strong id="mode-line">SPARTAN</strong></article>
            <article><span>Memory</span><strong id="memory-line">LOCAL</strong></article>
            <article><span>Session</span><strong id="session-line">NEW</strong></article>
            <article><span>Orbs</span><strong id="orb-line">0 LIVE</strong></article>
          </div>
        </section>

        <section class="drawer-section" id="panel-actions" data-panel="actions">
          <div class="action-grid">
            <button type="button" id="locate-button">Locate</button>
            <button type="button" id="clear-button">Clear History</button>
            <button type="button" id="materialize-button">Materialise Orb</button>
            <button type="button" id="dematerialize-button">Dematerialise</button>
            <button type="button" id="export-button">Export Transcript</button>
            <button type="button" id="focus-button">Focus Mode</button>
          </div>
        </section>
      </aside>
    </main>
  </body>
</html>
